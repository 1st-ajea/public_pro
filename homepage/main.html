<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>중년의 호작질 - 로또 생성기</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #333; margin-bottom: 10px;}
        p { color: #666; margin-bottom: 20px;}

        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px;}
        .game-row { margin: 15px 0; display: flex; align-items: center; justify-content: center; height: 50px;}
        .game-label { font-weight: bold; margin-right: 15px; color: #888; width: 50px; font-size: 0.9em;}

        /* 공 기본 스타일 */
        .ball { 
            width: 40px; height: 40px; line-height: 40px; border-radius: 50%; 
            text-align: center; margin: 0 5px; color: white; font-weight: bold; 
            font-size: 16px; text-shadow: 1px 1px 1px rgba(0,0,0,0.3);
            box-shadow: inset -3px -3px 5px rgba(0,0,0,0.2); /* 입체감 */
            
            /* [핵심] 애니메이션 속성 정의 */
            opacity: 0; /* 처음엔 안 보임 */
            transform: scale(0.3) rotate(-180deg); /* 아주 작고 회전된 상태 */
            transition: all 0.5s ease-out; /* 변할 때 0.5초 동안 부드럽게 */
        }

        /* [핵심] 애니메이션 활성화 클래스 */
        .ball.show {
            opacity: 1; /* 보임 */
            transform: scale(1) rotate(0deg); /* 제 크기로 돌아옴 */
        }

        /* 로또 공 색상 규격 */
        .n1 { background: #fbc400; } /* 1~10 */
        .n2 { background: #69c8f2; } /* 11~20 */
        .n3 { background: #ff7272; } /* 21~30 */
        .n4 { background: #aaa; }    /* 31~40 */
        .n5 { background: #b0d840; } /* 41~45 */

        button { 
            padding: 12px 24px; font-size: 16px; cursor: pointer; 
            background-color: #4CAF50; color: white; border: none; 
            border-radius: 25px; margin-bottom: 20px; 
            box-shadow: 0 3px 0 #3e8e41; transition: all 0.1s;
        }
        button:hover { background-color: #45a049; }
        button:active { box-shadow: 0 1px 0 #3e8e41; transform: translateY(2px); } /* 클릭 효과 */
    </style>
</head>
<body>

    <h1>🛠️ 중년의 호작질</h1>
    <p>이번 주 주인공은 당신?</p>
    <button onclick="generateLotto()">행운의 번호 뽑기</button>

    <div class="container" id="lotto-result">
        </div>

    <script>
        function getBallColorClass(num) {
            if (num <= 10) return 'n1';
            if (num <= 20) return 'n2';
            if (num <= 30) return 'n3';
            if (num <= 40) return 'n4';
            return 'n5';
        }

        function generateLotto() {
            const container = document.getElementById('lotto-result');
            container.innerHTML = ''; // 초기화

            for (let i = 1; i <= 5; i++) {
                let numbers = [];
                while (numbers.length < 6) {
                    let num = Math.floor(Math.random() * 45) + 1;
                    if (!numbers.includes(num)) numbers.push(num);
                }
                numbers.sort((a, b) => a - b); // 번호 정렬

                const row = document.createElement('div');
                row.className = 'game-row';
                row.innerHTML = `<span class="game-label">게임 ${i}</span>`;

                numbers.forEach((num, index) => {
                    const ball = document.createElement('div');
                    ball.className = `ball ${getBallColorClass(num)}`;
                    ball.innerText = num;
                    row.appendChild(ball);

                    // [핵심] 순차적 애니메이션 부여
                    // setTimeout을 이용해 시간차를 둡니다.
                    // 게임 수(i)와 공 순서(index)를 곱해 전체적인 순서를 정합니다.
                    setTimeout(() => {
                        ball.classList.add('show');
                    }, (i - 1) * 300 + index * 50); 
                    // 한 게임 내 공은 0.05초 간격, 게임 간에는 0.3초 간격
                });

                container.appendChild(row);
            }
        }
        
        // 페이지 로드 시 첫 생성
        generateLotto();
    </script>
</body>
</html>
